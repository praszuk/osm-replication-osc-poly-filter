name: Build and publish docker image on dockerhub
on:
  push:
    tags:
      - "v*"

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Extract versions
        id: vars
        run: |
          OSC_POLY_FILTER_VERSION=${GITHUB_REF#refs/tags/v}
          echo "OSC_POLY_FILTER_VERSION=$OSC_POLY_FILTER_VERSION" >> $GITHUB_ENV

          OSM2PGSQL_VERSION=$(grep "ARG OSM2PGSQL_VERSION" Dockerfile | cut -d= -f2)
          echo "OSM2PGSQL_VERSION=$OSM2PGSQL_VERSION" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: praszuk
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            praszuk/osm-replication-osc-poly-filter:latest
            praszuk/osm-replication-osc-poly-filter:${{ env.OSC_POLY_FILTER_VERSION }}-osm2pgsql-${{ env.OSM2PGSQL_VERSION }}