name: Tests

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build
        run: docker compose -f docker-compose-test.yml build

      - name: Run tests
        run: |
          docker compose -f docker-compose-test.yml up -d
          until docker compose -f docker-compose-test.yml exec db bash -c "pg_isready -U \$POSTGRES_USER"; do
            sleep 1;
          done
          docker compose -f docker-compose-test.yml run test bash -c "PYTHONPATH=. pytest -s -p no:cacheprovider tests"
